###############################################################################
# flake8 configuration
###############################################################################

[flake8]
max-line-length = 88
# E203/W503/W504/E226/E231: Black-compatible whitespace rules
# E704: one-line `def f(): ...` abstractmethod/Protocol stubs (Black-compatible)
ignore = W503,W504,E203,E226,E231,E704
exclude =
    .git,
    .tox,
    .venv,
    __pycache__,
    .lou-op-jobs,
    .mypy_cache,
    .pytest_cache,
    build,
    dist
