tasks:
- name: audit trail
  description: "Implement US-101 from PRD.md (## v0.3 section): an append-only JSONL\
    \ audit\ntrail for the native backend.\n\n1. Create `lou_op/audit.py` with class\
    \ `AuditLog`:\n   - `AuditLog(root: Path)` \u2014 events go to `<root>/.lou-op/audit.jsonl`\n\
    \   - `record(event: str, data: dict) -> None` \u2014 appends one JSON line:\n\
    \     {\"ts\": \"<ISO-8601 UTC>\", \"event\": event, \"data\": data}\n   - append-only;\
    \ mkdir parents on first write\n2. In `lou_op/backends/native_agent.py`, record\
    \ `tool_call` (name + args)\n   before executing each tool and `tool_result` (name\
    \ + first line of the\n   result) after. Create the AuditLog from `ctx.repo_path`\
    \ inside\n   `run_iteration`.\n\nThe spec is `tests/test_audit.py` \u2014 read\
    \ it first; do not modify it.\n"
  success_criteria:
  - python -m pytest tests/test_audit.py tests/test_native_agent.py -q
  lint: false
  judge: false
  protected_files:
  - tests/test_audit.py
  - tests/test_native_agent.py
  allowed_paths:
  - lou_op/audit.py
  - lou_op/backends/native_agent.py
  max_iterations: 6
  depends_on: []
  status: passed
- name: dependency-aware task selection
  description: "Implement US-102 from PRD.md (## v0.3 section): make the orchestrator\n\
    respect Task.depends_on.\n\nIn `lou_op/orchestrator.py`:\n1. Add `class DependencyError(Exception)`.\n\
    2. Add `select_next_task(tasks: List[Task]) -> Optional[Task]`:\n   - return the\
    \ first PENDING task whose depends_on are all PASSED\n   - return None when no\
    \ task is PENDING\n   - raise DependencyError if pending tasks remain but none\
    \ is runnable\n     (dep failed, dep name unknown, or dependency cycle)\n3. Use\
    \ it in `_execute` to pick each next task instead of iterating the\n   list in\
    \ order. Existing orchestrator behavior must stay green.\n\nThe spec is `tests/test_depends_on.py`\
    \ \u2014 read it first; do not modify it.\n"
  success_criteria:
  - python -m pytest tests/test_depends_on.py tests/test_orchestrator.py -q
  lint: false
  judge: false
  protected_files:
  - tests/test_depends_on.py
  - tests/test_orchestrator.py
  allowed_paths:
  - lou_op/orchestrator.py
  max_iterations: 6
  depends_on: []
  status: passed
- name: progress hygiene
  description: "Implement US-103 from PRD.md (## v0.3 section): curated progress memory.\n\
    \n1. In `lou_op/progress.py` add `trim_progress(text: str, max_entries: int =\
    \ 5) -> str`:\n   - if the text starts with a `## Codebase Patterns` section,\
    \ preserve it\n     verbatim at the top (everything until the first `## Iteration`\
    \ header)\n   - keep only the last `max_entries` `## Iteration ...` sections\n\
    \   - text already within the limit is returned unchanged (modulo\n     leading/trailing\
    \ whitespace)\n2. In `lou_op/loop.py`, apply `trim_progress` to the loop-generated\n\
    \   progress content before `write_scratchpad`.\n\nThe spec is `tests/test_progress_patterns.py`\
    \ \u2014 read it first; do not modify it.\n"
  success_criteria:
  - python -m pytest tests/test_progress_patterns.py tests/test_loop.py -q
  lint: false
  judge: false
  protected_files:
  - tests/test_progress_patterns.py
  - tests/test_loop.py
  allowed_paths:
  - lou_op/progress.py
  - lou_op/loop.py
  max_iterations: 6
  depends_on: []
  status: in_progress
- name: model qualification bench
  description: "Implement US-104 from PRD.md (## v0.3 section): the `lou-op bench`\
    \ command.\n\n1. Create `lou_op/bench.py`:\n   - `@dataclass TaskStats`: name,\
    \ runs, passes, pass_rate, mean_iterations\n   - `@dataclass BenchReport`: task_stats\
    \ (List[TaskStats])\n   - `run_bench(repo_path, tasks, backend, *, runs=3) ->\
    \ BenchReport`\n     Each run must start from clean state: snapshot with `git\
    \ stash -u`\n     or `git reset --hard` + clean untracked files between runs so\
    \ no\n     artifacts leak across runs (see test_bench_runs_are_isolated).\n  \
    \   Reuse `run_task` from lou_op.loop for each run; a run passes when\n     the\
    \ last IterationResult.passed is True; iterations = len(results).\n2. Add a `bench`\
    \ subcommand to `lou_op/cli.py`: loads a tasks yaml, runs\n   run_bench, prints\
    \ one line per task:\n   name / pass_rate / mean_iterations.\n\nThe spec is `tests/test_bench.py`\
    \ \u2014 read it first; do not modify it.\n"
  success_criteria:
  - python -m pytest tests/test_bench.py -q
  lint: false
  judge: false
  protected_files:
  - tests/test_bench.py
  allowed_paths:
  - lou_op/bench.py
  - lou_op/cli.py
  max_iterations: 6
  depends_on: []
  status: pending
